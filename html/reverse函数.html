<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>reverse函数</title><style>body{font-family:system-ui;background:#0f172a;color:#e5e7eb;margin:0;padding:20px}.box{max-width:980px;margin:auto;background:#111827;border:1px solid #334155;border-radius:12px;padding:16px}button{margin-right:8px}pre{background:#020617;border:1px solid #334155;padding:10px;border-radius:8px;white-space:pre-wrap}</style></head><body><div class="box"><h1>reverse 函数讲解</h1><button id="prev">上一页</button><button id="next">下一页</button><div id="p"></div></div><script>const pages=[`<h2>1. 函数原型</h2><pre>#include <algorithm>\nreverse(first, last);\n区间是 [first, last)</pre>`,`<h2>2. 常见用法</h2><pre>reverse(s.begin(), s.end());\nreverse(arr, arr+n);</pre>`,`<h2>3. 易错点</h2><pre>reverse 返回 void，不能写成 s = reverse(...)</pre>`];let i=0;const el=document.getElementById('p');function r(){el.innerHTML=pages[i];}document.getElementById('prev').onclick=()=>{if(i>0)i--;r();};document.getElementById('next').onclick=()=>{if(i<pages.length-1)i++;r();};r();</script></body></html>
