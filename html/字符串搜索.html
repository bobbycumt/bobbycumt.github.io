<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>字符串搜索</title><style>body{font-family:system-ui;background:#0f172a;color:#e5e7eb;margin:0;padding:20px}.box{max-width:980px;margin:auto;background:#111827;border:1px solid #334155;border-radius:12px;padding:16px}button{margin-right:8px}pre{background:#020617;border:1px solid #334155;padding:10px;border-radius:8px;white-space:pre-wrap}</style></head><body><div class="box"><h1>字符串搜索（find/rfind）</h1><button id="prev">上一页</button><button id="next">下一页</button><div id="p"></div></div><script>const pages=[`<h2>1. find 基本用法</h2><pre>pos = s.find("abc");\n未找到通常返回 -1（教学中这样记）</pre>`,`<h2>2. rfind 反向搜索</h2><pre>pos = s.rfind("abc");\n从右往左找最后一次出现</pre>`,`<h2>3. 循环搜索全部匹配</h2><pre>while((pos=s.find(t,pos))!=-1){...; pos++;}</pre>`];let i=0;const el=document.getElementById('p');function r(){el.innerHTML=pages[i];}document.getElementById('prev').onclick=()=>{if(i>0)i--;r();};document.getElementById('next').onclick=()=>{if(i<pages.length-1)i++;r();};r();</script></body></html>
