<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>计数排序/桶排序/下标去重 动画</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --active: #f59e0b;
      --done: #34d399;
      --hit: #22d3ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1e293b, #020617 70%);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .app {
      width: min(1120px, 100%);
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, .35);
    }
    h1 { margin: 0 0 8px; }
    .desc { color: var(--muted); line-height: 1.7; margin-bottom: 14px; }
    .controls {
      display: grid;
      grid-template-columns: 1fr repeat(4, auto);
      gap: 10px;
      margin-bottom: 12px;
    }
    input {
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0b1221;
      color: var(--text);
      padding: 10px 12px;
      font-size: 15px;
    }
    button {
      border-radius: 10px;
      border: 1px solid #475569;
      background: #1e293b;
      color: var(--text);
      padding: 10px 14px;
      cursor: pointer;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #020617;
      padding: 12px;
      margin-bottom: 10px;
    }
    .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .cell {
      min-width: 78px;
      text-align: center;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #111827;
      padding: 10px 8px;
      transition: all .2s;
      font-family: "Consolas", monospace;
    }
    .cell.hit {
      border-color: var(--hit);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, .2);
      transform: translateY(-2px);
    }
    .cell.done {
      border-color: #166534;
      background: rgba(22, 101, 52, 0.2);
    }
    .code-line.active { color: var(--active); font-weight: 700; }
    .log { max-height: 220px; overflow: auto; font-size: 14px; color: #d1d5db; }
    .result { color: #fde68a; font-weight: 700; }
  </style>
</head>
<body>
  <main class="app">
    <h1>计数排序 / 桶排序 / 数组下标去重（交互动画）</h1>
    <div class="desc">
      输入一组非负整数，动画会先执行 <code>cnt[a[i]]++</code>，再扫描桶输出去重后的升序结果。
    </div>

    <section class="controls">
      <input id="arrInput" type="text" value="5 1 3 5 2 3 1 7" aria-label="输入数组" />
      <button id="initBtn">初始化</button>
      <button id="stepBtn">单步执行</button>
      <button id="autoBtn">自动播放</button>
      <button id="resetBtn">重置</button>
    </section>

    <section class="card" id="status"></section>
    <section class="card" id="code"></section>
    <section class="card">
      <strong>输入数组</strong>
      <div class="row" id="arrRow"></div>
    </section>
    <section class="card">
      <strong>桶（展示 0 ~ max）</strong>
      <div class="row" id="bucketRow"></div>
    </section>
    <section class="card result" id="result">去重输出：[]</section>
    <section class="card log" id="log"></section>
  </main>

  <script>
    const arrInput = document.getElementById('arrInput');
    const initBtn = document.getElementById('initBtn');
    const stepBtn = document.getElementById('stepBtn');
    const autoBtn = document.getElementById('autoBtn');
    const resetBtn = document.getElementById('resetBtn');

    const statusEl = document.getElementById('status');
    const codeEl = document.getElementById('code');
    const arrRow = document.getElementById('arrRow');
    const bucketRow = document.getElementById('bucketRow');
    const resultEl = document.getElementById('result');
    const logEl = document.getElementById('log');

    const codeLines = [
      'for (i = 0..n-1) cnt[a[i]]++;      // 计数',
      'for (x = 0..mx) if (cnt[x] > 0) 输出 x;  // 去重输出'
    ];

    let timer = null;
    let st = null;

    function parseInput() {
      const nums = arrInput.value.trim().split(/[,\s]+/).filter(Boolean).map(Number);
      if (!nums.length) return null;
      if (nums.some(v => Number.isNaN(v) || v < 0 || !Number.isInteger(v))) return null;
      return nums.slice(0, 16);
    }

    function drawCode(active = -1) {
      codeEl.innerHTML = codeLines.map((line, i) => `<div class="code-line ${i === active ? 'active' : ''}">${line}</div>`).join('');
    }

    function drawArrays() {
      arrRow.innerHTML = st.arr.map((v, i) => `<div class="cell ${i === st.i && st.phase === 'count' ? 'hit' : ''}">a[${i}] = ${v}</div>`).join('');
      bucketRow.innerHTML = Array.from({length: st.mx + 1}, (_, x) => {
        const hit = st.phase === 'scan' && x === st.x;
        const done = st.phase === 'scan' && x < st.x;
        return `<div class="cell ${hit ? 'hit' : ''} ${done ? 'done' : ''}">cnt[${x}] = ${st.cnt[x]}</div>`;
      }).join('');
    }

    function render() {
      if (!st) return;
      statusEl.innerHTML = `
        <div>阶段：<b>${st.phase === 'count' ? '计数阶段' : st.phase === 'scan' ? '扫描桶阶段' : '完成'}</b></div>
        <div>i = <b>${st.i ?? '-'}</b>，x = <b>${st.x ?? '-'}</b></div>
      `;
      drawArrays();
      resultEl.textContent = `去重输出：[${st.out.join(', ')}]`;
      logEl.innerHTML = st.log.map(line => `<div>${line}</div>`).join('');
      logEl.scrollTop = logEl.scrollHeight;
    }

    function log(msg) {
      st.log.push(msg);
      if (st.log.length > 120) st.log.shift();
    }

    function stopAuto() {
      if (timer) clearInterval(timer);
      timer = null;
      autoBtn.textContent = '自动播放';
    }

    function init() {
      stopAuto();
      const arr = parseInput();
      if (!arr) {
        alert('请输入非负整数，例如：5 1 3 5 2');
        return;
      }
      const mx = Math.max(...arr);
      st = {
        arr,
        cnt: new Array(mx + 1).fill(0),
        mx,
        i: 0,
        x: 0,
        out: [],
        phase: 'count',
        done: false,
        log: ['初始化成功：先执行计数，再扫描桶去重输出。']
      };
      drawCode(0);
      render();
    }

    function step() {
      if (!st) init();
      if (!st || st.done) return;

      if (st.phase === 'count') {
        drawCode(0);
        const v = st.arr[st.i];
        st.cnt[v]++;
        log(`计数：读取 a[${st.i}] = ${v}，执行 cnt[${v}]++ => ${st.cnt[v]}`);
        st.i++;
        if (st.i >= st.arr.length) {
          st.phase = 'scan';
          st.x = 0;
          log('计数阶段结束，进入扫描桶阶段。');
        }
        render();
        return;
      }

      if (st.phase === 'scan') {
        drawCode(1);
        if (st.x <= st.mx) {
          if (st.cnt[st.x] > 0) {
            st.out.push(st.x);
            log(`扫描：cnt[${st.x}] = ${st.cnt[st.x]} > 0，输出 ${st.x}`);
          } else {
            log(`扫描：cnt[${st.x}] = 0，跳过`);
          }
          st.x++;
          if (st.x > st.mx) {
            st.phase = 'done';
            st.done = true;
            log('<span style="color:#34d399;font-weight:700;">完成：得到去重后的升序序列。</span>');
            drawCode(-1);
            stopAuto();
          }
          render();
        }
      }
    }

    function autoPlay() {
      if (!st) init();
      if (!st) return;
      if (timer) {
        stopAuto();
        return;
      }
      autoBtn.textContent = '暂停播放';
      timer = setInterval(() => {
        step();
        if (st?.done) stopAuto();
      }, 600);
    }

    initBtn.addEventListener('click', init);
    stepBtn.addEventListener('click', step);
    autoBtn.addEventListener('click', autoPlay);
    resetBtn.addEventListener('click', init);

    init();
  </script>
</body>
</html>
